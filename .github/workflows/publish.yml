name: Publish csv-charts-ai to npm

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'packages/csv-charts-ai/**'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          registry-url: 'https://registry.npmjs.org'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm --filter csv-charts-ai build

      - name: Release
        working-directory: packages/csv-charts-ai
        run: pnpm release
        env:
          NPM_CONFIG_PROVENANCE: true
